<!DOCTYPE html>
<html>
<head>
    <title>Integrated Urban Flood Prediction System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 90vh; }
        h2 { text-align: center; }
    </style>
</head>
<body>

<h2>Flood Risk Heatmap</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([17.3850, 78.4867], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    fetch('http://127.0.0.1:5000/heatmap-data')
    .then(response => response.json())
    .then(data => {
        data.forEach(point => {
            let color;

            if (point.risk === "High") color = "red";
            else if (point.risk === "Moderate") color = "orange";
            else color = "green";

            L.circle([point.lat, point.lng], {
                color: color,
                fillColor: color,
                fillOpacity: 0.5,
                radius: 500
            })
            .addTo(map)
            .bindPopup(`<b>${point.risk}</b> Flood Risk`);
        });
    });
</script>

</body>
</html>
